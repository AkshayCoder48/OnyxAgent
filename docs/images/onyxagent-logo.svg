<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" width="960" height="320">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fda4af"/>
      <stop offset="30%" stop-color="#f43f5e"/>
      <stop offset="70%" stop-color="#e11d48"/>
      <stop offset="100%" stop-color="#9f1239"/>
    </linearGradient>
    <linearGradient id="gemShine2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="innerGlow2" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#fecdd3" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#be123c" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="softShadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#9f1239" flood-opacity="0.3"/>
    </filter>
    <filter id="innerLight2" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Icon: Onyx Gem with Neural Network -->
  <g transform="translate(20, 20)">
    <!-- Background circle -->
    <circle cx="140" cy="140" r="130" fill="url(#logoGrad)" filter="url(#softShadow2)"/>

    <!-- Inner ring cutout -->
    <circle cx="140" cy="140" r="84" fill="#0f0a0b"/>

    <!-- Gem facets -->
    <path d="M140 56 L186 108 L94 108 Z" fill="url(#innerGlow2)" opacity="0.7"/>
    <path d="M94 108 L94 172 L71 140 Z" fill="#1a1012" opacity="0.6"/>
    <path d="M186 108 L186 172 L209 140 Z" fill="#1a1012" opacity="0.6"/>
    <path d="M94 172 L140 224 L71 140 Z" fill="#2a1520" opacity="0.5"/>
    <path d="M186 172 L140 224 L209 140 Z" fill="#2a1520" opacity="0.5"/>
    <path d="M140 56 L186 108 L140 140 L94 108 Z" fill="url(#gemShine2)" opacity="0.25"/>

    <!-- Neural network nodes -->
    <g filter="url(#innerLight2)">
      <circle cx="140" cy="140" r="10" fill="#f43f5e" opacity="0.95"/>
      <circle cx="140" cy="140" r="5.5" fill="#fff" opacity="0.9"/>
      <circle cx="110" cy="101" r="4" fill="#fda4af" opacity="0.8"/>
      <circle cx="170" cy="101" r="4" fill="#fda4af" opacity="0.8"/>
      <circle cx="182" cy="140" r="3.5" fill="#fb7185" opacity="0.7"/>
      <circle cx="98" cy="140" r="3.5" fill="#fb7185" opacity="0.7"/>
      <circle cx="110" cy="179" r="4" fill="#fda4af" opacity="0.8"/>
      <circle cx="170" cy="179" r="4" fill="#fda4af" opacity="0.8"/>
      <circle cx="125" cy="80" r="2" fill="#fecdd3" opacity="0.6"/>
      <circle cx="155" cy="80" r="2" fill="#fecdd3" opacity="0.6"/>
      <circle cx="185" cy="117" r="2" fill="#fecdd3" opacity="0.6"/>
      <circle cx="95" cy="117" r="2" fill="#fecdd3" opacity="0.6"/>
      <circle cx="185" cy="163" r="2" fill="#fecdd3" opacity="0.6"/>
      <circle cx="95" cy="163" r="2" fill="#fecdd3" opacity="0.6"/>
      <circle cx="125" cy="200" r="2" fill="#fecdd3" opacity="0.6"/>
      <circle cx="155" cy="200" r="2" fill="#fecdd3" opacity="0.6"/>
    </g>

    <!-- Connection lines -->
    <g stroke="#f43f5e" stroke-width="1" opacity="0.35">
      <line x1="140" y1="140" x2="110" y2="101"/>
      <line x1="140" y1="140" x2="170" y2="101"/>
      <line x1="140" y1="140" x2="182" y2="140"/>
      <line x1="140" y1="140" x2="98" y2="140"/>
      <line x1="140" y1="140" x2="110" y2="179"/>
      <line x1="140" y1="140" x2="170" y2="179"/>
    </g>
    <g stroke="#fb7185" stroke-width="0.7" opacity="0.25">
      <line x1="110" y1="101" x2="125" y2="80"/>
      <line x1="110" y1="101" x2="95" y2="117"/>
      <line x1="170" y1="101" x2="155" y2="80"/>
      <line x1="170" y1="101" x2="185" y2="117"/>
      <line x1="182" y1="140" x2="185" y2="163"/>
      <line x1="98" y1="140" x2="95" y2="163"/>
      <line x1="110" y1="179" x2="125" y2="200"/>
      <line x1="110" y1="179" x2="95" y2="163"/>
      <line x1="170" y1="179" x2="155" y2="200"/>
      <line x1="170" y1="179" x2="185" y2="163"/>
    </g>

    <!-- Pulse rings -->
    <circle cx="140" cy="140" r="16" fill="none" stroke="#f43f5e" stroke-width="1" opacity="0.3"/>
    <circle cx="140" cy="140" r="23" fill="none" stroke="#f43f5e" stroke-width="0.7" opacity="0.15"/>
    <circle cx="140" cy="140" r="30" fill="none" stroke="#f43f5e" stroke-width="0.4" opacity="0.08"/>
  </g>

  <!-- Wordmark: OnyxAgent -->
  <g transform="translate(320, 0)">
    <!-- "Onyx" in bold dark -->
    <text x="0" y="172" font-family="'Inter', 'SF Pro Display', -apple-system, system-ui, sans-serif" font-weight="800" font-size="108" fill="#111827" letter-spacing="-3">
      Onyx
    </text>

    <!-- "Agent" in medium weight, slightly lighter -->
    <text x="278" y="172" font-family="'Inter', 'SF Pro Display', -apple-system, system-ui, sans-serif" font-weight="500" font-size="108" fill="#9ca3af" letter-spacing="-3">
      Agent
    </text>

    <!-- Rose accent underline beneath "Onyx" -->
    <rect x="2" y="190" width="270" height="5" rx="2.5" fill="url(#logoGrad)"/>

    <!-- Tagline -->
    <text x="4" y="230" font-family="'Inter', 'SF Pro Display', -apple-system, system-ui, sans-serif" font-weight="400" font-size="18" fill="#9ca3af" letter-spacing="3">
      OPEN-SOURCE AI AGENT
    </text>
  </g>
</svg>
