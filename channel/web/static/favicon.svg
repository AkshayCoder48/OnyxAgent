<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="ringGrad" x1="80" y1="56" x2="432" y2="456" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="40%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#be123c"/>
    </linearGradient>
    <radialGradient id="nodeGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Subtle ambient glow -->
  <circle cx="256" cy="256" r="230" fill="url(#nodeGlow)" opacity="0.15"/>

  <!-- Main O ring with gem facet notch (upper-right, 40° opening from -60° to -20°) -->
  <path d="M341 75 A200 200 0 1 1 449 204 L382 222 A130 130 0 1 0 311 138 Z"
        fill="url(#ringGrad)"/>

  <!-- Facet highlight edges (gem cut reflections) -->
  <line x1="341" y1="75" x2="311" y2="138" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.22"/>
  <line x1="449" y1="204" x2="382" y2="222" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.32"/>

  <!-- Subtle inner ring highlight (gem curvature) -->
  <path d="M180 130 A165 165 0 0 1 370 110" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.1" stroke-linecap="round"/>

  <!-- AI intelligence node in the facet opening -->
  <circle cx="387" cy="148" r="18" fill="#fff" opacity="0.12" filter="url(#softGlow)"/>
  <circle cx="387" cy="148" r="13" fill="#fff" opacity="0.92"/>
  <circle cx="387" cy="148" r="5.5" fill="#e11d48"/>

  <!-- Tiny accent sparkle -->
  <circle cx="395" cy="140" r="2" fill="#fff" opacity="0.7"/>
</svg>
